name: Bundle Platform

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Roc
        uses: hasnep/setup-roc@main
        with:
          roc-version: nightly

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set macOS linker flags
        if: runner.os == 'macOS'
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-headerpad,0x4000" >> $GITHUB_ENV

      - name: Build platform host
        run: bash jump-start.sh

      - name: Build platform binaries
        run: roc run --linker=legacy build.roc

      - name: Verify host files exist
        run: |
          ls -la platform/${{ matrix.target }}.rh
          ls -la platform/metadata_${{ matrix.target }}.rm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            platform/${{ matrix.target }}.*
            platform/metadata_${{ matrix.target }}.*

  bundle:
    name: Bundle Platform
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: platform/
          merge-multiple: true

      - name: Verify all host files exist
        run: |
          ls -la platform/linux-x64.rh
          ls -la platform/metadata_linux-x64.rm
          ls -la platform/macos-arm64.rh
          ls -la platform/metadata_macos-arm64.rm

      - name: Install Roc
        uses: hasnep/setup-roc@main
        with:
          roc-version: nightly

      - name: Generate docs
        env:
          ROC_DOCS_URL_ROOT: /basic-webserver/${{ github.event.release.tag_name }}
        run: roc docs platform/main.roc

      - name: Package docs
        run: tar -czf docs.tar.gz -C generated-docs .

      - name: Upload docs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" docs.tar.gz --repo "${{ github.repository }}"

      - name: Bundle and release the platform
        uses: hasnep/bundle-roc-library@v0.1.0
        with:
          library: platform/main.roc
          token: ${{ github.token }}
